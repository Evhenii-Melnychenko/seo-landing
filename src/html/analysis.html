<section class="form-section" id="analysis">
  <div class="form-section__container container">
    <div class="form-section__wrapper" data-reveal="from-bottom">
      <h2 class="form-section__title">Get a Free SEO Analysis!</h2>
      <form action="#" class="form-section__form">
        <label for="form-name" class="form-section__label">
          <span class="form-section__label-text">Name</span>
          <input type="text" class="form-section__label-input" placeholder="Your name" id="form-name" name="form-name">
        </label>
        <label for="form-email" class="form-section__label">
          <span class="form-section__label-text">Email</span>
          <input type="email" class="form-section__label-input" placeholder="Your working email" id="form-email" name="form-email">
        </label>
        <label for="form-website" class="form-section__label">
          <span class="form-section__label-text">Your website URL</span>
          <input type="url" class="form-section__label-input" placeholder="http://yoursite.com" id="form-website" name="form-website">
        </label>
        <div class="form-section__form-wrapper">
          <label for="form-checkbox" class="form-section__form-custom-checkbox">
            <input type="checkbox" class="real-checkbox" name="form-checkbox" id="form-checkbox">
            <span class="form-section__form-custom-checkbox__checkbox"></span>
            <span class="form-section__form-custom-checkbox__text">I agree to receive communications from Createx SEO Agency</span>
          </label>
          <button class="form-section__btn" type="submit">Get a free analysis</button>
        </div>
      </form>
    </div>
  </div>
</section>
