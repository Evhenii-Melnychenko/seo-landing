<section class="subscribe">
  <div class="subscribe__container container">
    <h2 class="subscribe__title">Subscribe to Get The Latest News</h2>
    <p class="subscribe__text">Join our newsletter and receive new product drops and room inspiration.</p>

    <form class="subscribe__form" action="#" method="post">
      <label class="visually-hidden" for="subscribe-email">Email address</label>
      <input id="subscribe-email" type="email" placeholder="Enter your email" required>
      <button type="submit">Subscribe</button>
    </form>
  </div>
</section>
